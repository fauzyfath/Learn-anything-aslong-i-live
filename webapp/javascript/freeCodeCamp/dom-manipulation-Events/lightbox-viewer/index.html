<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Box Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Museum Gallery</h1>
        <div class="gallery">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="gallery1" srcset="" class="gallery-item">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="gallery2" srcset="" class="gallery-item">
            <img src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="" srcset="" class="gallery-item">
        </div>
        <div class="lightbox">
            <button id="close-btn">&times;</button>
            <img src="" alt="" srcset="" id="lightbox-image">
        </div>
    </main>
</body>
<script src="script.js"></script>
</html>
